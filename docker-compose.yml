services:
  db:
    image: postgres:16-alpine
    container_name: sct_transmetro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sct_transmetro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - sct_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sct_transmetro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: sct_transmetro_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      CLIENT_URL: http://localhost:5173
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sct_transmetro
      DB_USER: postgres
      DB_PASSWORD: postgres123
      JWT_SECRET: cambiar_este_secreto_sct_transmetro
      JWT_EXPIRES_IN: 8h
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: sct_transmetro_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
      VITE_SOCKET_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  sct_pgdata:
