services:
  db:
    image: postgres:16-alpine
    container_name: sct_transmetro_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sct_transmetro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
    volumes:
      - sct_pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sct_transmetro"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    command: npm start
    container_name: sct_transmetro_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:?Defina CLIENT_URL}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sct_transmetro
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?Defina JWT_SECRET}
      JWT_EXPIRES_IN: 8h
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: sct_transmetro_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sct_pgdata:
